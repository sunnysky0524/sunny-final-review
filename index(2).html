<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny 科技產業分析與管理期末複習站</title>
  <style>
    :root{
      --bg:#fff7fb;--card:#ffffff;--ink:#2b2530;--muted:#7a6f80;--pink:#ff7eb6;--pink2:#ffd6e8;--violet:#8f7af5;--good:#1f9d63;--bad:#e5484d;--line:#f0d9e6;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:linear-gradient(180deg,var(--bg),#fff);color:var(--ink);font-size:18px;line-height:1.6}
    header{position:sticky;top:0;z-index:10;background:rgba(255,247,251,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 18px}
    h1{font-size:24px;margin:0 0 8px}.sub{color:var(--muted);font-size:15px}
    nav{display:flex;gap:8px;overflow-x:auto;padding-top:10px}
    nav button,.pill{border:0;background:#fff;border:1px solid var(--line);border-radius:999px;padding:11px 16px;font-size:17px;white-space:nowrap;box-shadow:0 2px 8px rgba(143,122,245,.08)}
    nav button.active{background:var(--pink);color:#fff;border-color:var(--pink)}
    main{max-width:980px;margin:0 auto;padding:18px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 22px rgba(143,122,245,.08);margin-bottom:16px}.stat{font-size:28px;font-weight:800}.label{font-size:14px;color:var(--muted)}
    .section{display:none}.section.active{display:block}.title{font-size:22px;font-weight:800;margin:6px 0 12px}.question{font-size:22px;font-weight:700;margin:8px 0 14px}.options{display:grid;gap:12px}.option{width:100%;text-align:left;border:2px solid var(--line);background:#fff;border-radius:18px;padding:16px 18px;font-size:19px;cursor:pointer}.option:hover{border-color:var(--pink)}.option.correct{border-color:var(--good);background:#edfff6}.option.wrong{border-color:var(--bad);background:#fff0f0}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{border:0;border-radius:16px;background:var(--violet);color:white;padding:13px 18px;font-size:18px;font-weight:700;cursor:pointer}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn.pink{background:var(--pink)}.feedback{margin-top:14px;padding:14px;border-radius:16px;background:#faf7ff;border:1px solid #e7ddff}.small{font-size:15px;color:var(--muted)}
    select,input{font-size:18px;padding:12px;border-radius:14px;border:1px solid var(--line);background:#fff}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.note{background:#fff6cc;border:1px solid #f1dc78;border-radius:16px;padding:14px}.flash{cursor:pointer}.hiddenAns{filter:blur(6px);user-select:none}.answerText{font-weight:800;color:var(--violet)}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}td,th{border:1px solid var(--line);padding:10px;text-align:left}th{background:var(--pink2)}.tag{font-size:13px;background:var(--pink2);border-radius:999px;padding:4px 9px;color:#7c3152}.list{display:grid;gap:10px}.listItem{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}.progress{height:12px;background:#f5e8f0;border-radius:999px;overflow:hidden}.bar{height:100%;background:var(--pink);width:0%}
    .fillInput{width:100%;margin-top:8px}.miniTitle{font-weight:800;margin-top:10px;color:#6b4bd8}
    @media(max-width:760px){body{font-size:17px}main{padding:12px}.grid{grid-template-columns:repeat(2,1fr)}.question{font-size:20px}.option{font-size:18px;padding:15px}.card{border-radius:18px;padding:15px}nav button{font-size:16px;padding:10px 13px}}
    @media(min-width:761px) and (max-width:1100px){body{font-size:20px}.option,.btn,select,input{font-size:20px}.question{font-size:25px}main{padding:22px}.card{padding:22px}}
  </style>
</head>

function $(id){return document.getElementById(id)}
function showTab(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id)); if(id==='wrong')renderWrong(); if(id==='home')renderHome();}
function initTabs(){const nav=document.getElementById('tabs'); tabs.forEach(([id,name])=>{const b=document.createElement('button');b.textContent=name;b.dataset.id=id;b.onclick=()=>showTab(id); if(id==='home')b.classList.add('active');nav.appendChild(b);});}
function renderHome(){const total=mcq.length, wrongN=Object.keys(state.wrong||{}).length, rate=state.done?Math.round(state.correct/state.done*100):0; $('home').innerHTML=`<div class="grid"><div class="card"><div class="stat">${total}</div><div class="label">選擇題總數</div></div><div class="card"><div class="stat">${state.done||0}</div><div class="label">已作答</div></div><div class="card"><div class="stat">${rate}%</div><div class="label">累積答對率</div></div><div class="card"><div class="stat">${wrongN}</div><div class="label">錯題數</div></div></div><div class="card"><div class="title">今天怎麼用？</div><p>先刷「選擇題」，再看「錯題本」。考前 10 分鐘用「考前衝刺」與「填充題」。</p><div class="note">平板可用：按鈕已加大，直向與橫向都可以操作。</div><div class="actions"><button class="btn pink" onclick="showTab('practice')">開始練習</button><button class="btn" onclick="showTab('exam')">開始模擬考</button></div></div>`;}
function shuffle(arr){return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);}
function renderPractice(){const cats=['全部',...new Set(mcq.map(x=>x.cat))]; $('practice').innerHTML=`<div class="card"><div class="title">選擇題練習</div><div class="row"><select id="catSel">${cats.map(c=>`<option>${c}</option>`).join('')}</select><button class="btn secondary" onclick="startPractice(false)">依序練習</button><button class="btn pink" onclick="startPractice(true)">隨機練習</button></div></div><div id="practiceBox"></div>`; startPractice(false);}
function startPractice(random){const cat=$('catSel')?.value||'全部'; practiceOrder=mcq.map((_,i)=>i).filter(i=>cat==='全部'||mcq[i].cat===cat); if(random)practiceOrder=shuffle(practiceOrder); current=0; showQuestion();}
function showQuestion(){answered=false; const i=practiceOrder[current]; const item=mcq[i]; $('practiceBox').innerHTML=`<div class="card"><div class="small">${current+1}/${practiceOrder.length} <span class="tag">${item.cat}</span></div><div class="progress"><div class="bar" style="width:${(current)/practiceOrder.length*100}%"></div></div><div class="question">${item.q}</div><div class="options">${item.opts.map((o,idx)=>`<button class="option" onclick="choose(${idx})">${String.fromCharCode(65+idx)}. ${o}</button>`).join('')}</div><div id="fb"></div><div class="actions"><button class="btn secondary" onclick="prevQ()">上一題</button><button class="btn" onclick="nextQ()">下一題</button></div></div>`;}
function choose(idx){if(answered)return; answered=true; const i=practiceOrder[current], item=mcq[i]; const opts=document.querySelectorAll('.option'); opts[item.a].classList.add('correct'); if(idx!==item.a){opts[idx].classList.add('wrong'); state.wrong[i]=(state.wrong[i]||0)+1;} state.done=(state.done||0)+1; if(idx===item.a)state.correct=(state.correct||0)+1; $('fb').innerHTML=`<div class="feedback"><b>${idx===item.a?'答對 ✅':'答錯 ❌'}</b><br>正確答案：${String.fromCharCode(65+item.a)}. ${item.opts[item.a]}<br><span class="small">解析：${item.exp}</span></div>`; save();}
function nextQ(){if(current<practiceOrder.length-1){current++;showQuestion();}}
function prevQ(){if(current>0){current--;showQuestion();}}
function renderExam(){ $('exam').innerHTML=`<div class="card"><div class="title">模擬考</div><p>隨機抽題，完成後看分數與錯題。</p><div class="row"><select id="examCount"><option>10</option><option>20</option><option>30</option><option>${mcq.length}</option></select><button class="btn pink" onclick="startExam()">開始</button></div></div><div id="examBox"></div>`;}
let examOrder=[], examIdx=0, examAns=[];
function startExam(){const n=Math.min(parseInt($('examCount').value),mcq.length); examOrder=shuffle([...mcq.keys()]).slice(0,n); examIdx=0; examAns=[]; showExamQ();}
function showExamQ(){const item=mcq[examOrder[examIdx]]; $('examBox').innerHTML=`<div class="card"><div class="small">模擬考 ${examIdx+1}/${examOrder.length}</div><div class="question">${item.q}</div><div class="options">${item.opts.map((o,i)=>`<button class="option" onclick="examChoose(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div></div>`;}
function examChoose(idx){examAns[examIdx]=idx; if(examIdx<examOrder.length-1){examIdx++;showExamQ();}else finishExam();}
function finishExam(){let right=0, wrongs=[]; examOrder.forEach((qi,k)=>{if(examAns[k]===mcq[qi].a)right++; else {wrongs.push(qi); state.wrong[qi]=(state.wrong[qi]||0)+1;}}); state.lastExam={right,total:examOrder.length,date:new Date().toLocaleString()}; save(); $('examBox').innerHTML=`<div class="card"><div class="title">成績：${right}/${examOrder.length}</div><p>答對率 ${Math.round(right/examOrder.length*100)}%</p>${wrongs.length?`<div class="title">本次錯題</div><div class="list">${wrongs.map(i=>`<div class="listItem"><b>${mcq[i].q}</b><br>答案：${mcq[i].opts[mcq[i].a]}<br><span class="small">${mcq[i].exp}</span></div>`).join('')}</div>`:'<p>太強了，這次沒有錯題！</p>'}</div>`;}
function renderWrong(){const ids=Object.keys(state.wrong||{}); $('wrong').innerHTML=`<div class="card"><div class="title">錯題本</div>${ids.length?'':'<p>目前還沒有錯題。</p>'}<div class="list">${ids.map(id=>{const q=mcq[id];return `<div class="listItem"><span class="tag">錯 ${state.wrong[id]} 次</span><br><b>${q.q}</b><br>答案：${q.opts[q.a]}<br><span class="small">${q.exp}</span></div>`}).join('')}</div><div class="actions"><button class="btn secondary" onclick="state.wrong={};save();renderWrong();">清空錯題本</button></div></div>`;}
function renderFill(){ $('fill').innerHTML=`<div class="card"><div class="title">填充題專區</div><p>點卡片可以顯示／隱藏答案。</p></div><div class="list">${fillCards.map((f,i)=>`<div class="card flash" onclick="toggleAns(${i})"><b>Q：${f.q}</b><div id="ans${i}" class="answerText hiddenAns">A：${f.a}</div></div>`).join('')}</div>`;}
function toggleAns(i){$('ans'+i).classList.toggle('hiddenAns');}
function renderSummary(){ $('summary').innerHTML=`<div class="card"><div class="title">重點整理小抄</div><table><tr><th>主題</th><th>必背內容</th></tr>${fillCards.map(f=>`<tr><td>${f.q}</td><td>${f.a}</td></tr>`).join('')}</table></div>`;}
function renderSprint(){const hot=fillCards.slice(0,10); $('sprint').innerHTML=`<div class="card"><div class="title">考前衝刺</div><p>考前快速背這些最像填充題。</p></div>${hot.map(f=>`<div class="card"><b>${f.q}</b><br><span class="answerText">${f.a}</span></div>`).join('')}`;}
initTabs();renderHome();renderPractice();renderExam();renderFill();renderSummary();renderSprint();
</script>
</body>
</html>
