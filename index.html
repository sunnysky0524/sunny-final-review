['3B策略架構','拼湊（Bricolage）、連介（Brokerage）、傳播（Broadcast）'],['創新路徑三要素','規則、資源、行動'],['守破離','守：遵守規範；破：突破教條；離：形成獨特風格'],['台積電回應摩爾定律三階段','摩爾為王（1987–2000）、深度摩爾（2001–2010）、超越摩爾（2011–2019）'],['DiMaggio & Powell 三種同形力量','強制同形、模仿同形、規範同形'],['Suchman 三種正當性','實用正當性、道德正當性、認知正當性'],['Oliver 五種制度壓力策略反應','默認（Acquiescence）、妥協（Compromise）、規避（Avoidance）、挑戰（Defiance）、操控（Manipulation）'],['尼采三階段','駱駝、獅子、嬰兒'],['新型態組織誕生三元素','技術機會、社會制度、創業行動'],['FAN記憶','Framing（賦名）、Aggregating（整合）、Networking（網路）'],['工研院連介七項記憶','成立前瞻會、舉辦研討會、引入國外管理機制、汲取大學能量、促進研發聯盟運作、國際化發展、引入開放式創新'],['制度變革三類','去制度化、再制度化、制度創建'],['正當性白話記憶','有好處＝實用；應該做＝道德；理所當然＝認知'],['同形力量白話記憶','被要求＝強制；不確定跟著做＝模仿；專業訓練一致＝規範']
];
let state={tab:'home',idx:0,filter:'全部',answered:false,exam:[],examIdx:0,score:0,examDone:false,fillShow:null};
const LS='sunny_final_v2_wrong';const wrong=()=>JSON.parse(localStorage.getItem(LS)||'[]');const saveWrong=a=>localStorage.setItem(LS,JSON.stringify([...new Set(a)]));const cats=['全部',...new Set(mcq.map(x=>x.cat))];
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function qs(){return state.filter==='全部'?mcq:mcq.filter(x=>x.cat===state.filter)}
function nav(){let tabs=[['home','首頁'],['practice','選擇題'],['exam','模擬考'],['wrong','錯題本'],['fill','必考填充'],['summary','考前速讀']];document.getElementById('nav').innerHTML=tabs.map(t=>`<button class="${state.tab===t[0]?'active':''}" onclick="go('${t[0]}')">${t[1]}</button>`).join('')}
function go(t){state.tab=t;document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));document.getElementById(t).classList.add('active');nav();render()}
function render(){renderHome();renderPractice();renderExam();renderWrong();renderFill();renderSummary()}
function renderHome(){let w=wrong().length;home.innerHTML=`<div class=card><div class=q>今天目標：先刷選擇題，再背必考填充</div><div class=note>總題數 <b>${mcq.length}</b> 題。已加入：3B、FAN、Oliver、Suchman、守破離、台積電三階段、同形力量、創新路徑三要素、尼采三階段、工研院七項連介制度策略。</div></div><div class=grid><div class=card><div class=stat>${mcq.length}</div><div class=label>選擇題</div></div><div class=card><div class=stat>${fills.length}</div><div class=label>填充重點</div></div><div class=card><div class=stat>${w}</div><div class=label>錯題本</div></div><div class=card><div class=stat>30</div><div class=label>模擬考題數</div></div></div><div class=card><button class="btn pink" onclick="go('practice')">開始刷題</button><button class=btn onclick="startExam()">開始模擬考</button><button class="btn sec2" onclick="go('fill')">背填充</button></div>`}
function renderPractice(){let list=qs(),q=list[state.idx%list.length];practice.innerHTML=`<div class=card><div class=row><select onchange="state.filter=this.value;state.idx=0;state.answered=false;render()">${cats.map(c=>`<option ${c===state.filter?'selected':''}>${c}</option>`).join('')}</select><span class=tag>${q.cat}</span><span class=small>${state.idx+1}/${list.length}</span></div><div class=q>${q.q}</div><div class=opts>${q.opts.map((o,i)=>`<button class=opt onclick="ans(${q.id},${i},this)">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div><div id=fb></div><button class="btn sec2" onclick="prevQ()">上一題</button><button class=btn onclick="nextQ()">下一題</button><button class="btn pink" onclick="randQ()">隨機</button></div>`}
function ans(id,i,el){let q=mcq.find(x=>x.id===id);document.querySelectorAll('#practice .opt').forEach((b,k)=>{b.disabled=true;if(k===q.a)b.classList.add('correct');if(k===i&&i!==q.a)b.classList.add('wrong')});let w=wrong();if(i!==q.a&&!w.includes(id)){w.push(id);saveWrong(w)}fb.innerHTML=`<div class=fb>${i===q.a?'✅ 答對':'❌ 答錯'}。正解：${String.fromCharCode(65+q.a)}. ${q.opts[q.a]}<br>${q.exp}</div>`;renderHome()}
function nextQ(){state.idx=(state.idx+1)%qs().length;renderPractice()}function prevQ(){state.idx=(state.idx-1+qs().length)%qs().length;renderPractice()}function randQ(){state.idx=Math.floor(Math.random()*qs().length);renderPractice()}
function startExam(){state.tab='exam';state.exam=shuffle(mcq).slice(0,30);state.examIdx=0;state.score=0;state.examDone=false;go('exam')}
function renderExam(){if(!state.exam.length){exam.innerHTML=`<div class=card><div class=q>模擬考：隨機 30 題</div><button class="btn pink" onclick="startExam()">開始</button></div>`;return}if(state.examDone){let pct=Math.round(state.score/state.exam.length*100);exam.innerHTML=`<div class=card><div class=q>模擬考完成</div><div class=stat>${state.score}/${state.exam.length}（${pct}%）</div><button class="btn pink" onclick="startExam()">再考一次</button><button class=btn onclick="go('wrong')">看錯題</button></div>`;return}let q=state.exam[state.examIdx];exam.innerHTML=`<div class=card><div class=small>第 ${state.examIdx+1}/${state.exam.length} 題</div><div class=progress><div class=bar style="width:${state.examIdx/state.exam.length*100}%"></div></div><span class=tag>${q.cat}</span><div class=q>${q.q}</div><div class=opts>${q.opts.map((o,i)=>`<button class=opt onclick="examAns(${i},this)">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div><div id=efb></div></div>`}
function examAns(i,el){let q=state.exam[state.examIdx];document.querySelectorAll('#exam .opt').forEach((b,k)=>{b.disabled=true;if(k===q.a)b.classList.add('correct');if(k===i&&i!==q.a)b.classList.add('wrong')});if(i===q.a)state.score++;else{let w=wrong();if(!w.includes(q.id)){w.push(q.id);saveWrong(w)}}efb.innerHTML=`<div class=fb>${i===q.a?'✅':'❌'} 正解：${q.opts[q.a]}<br>${q.exp}<br><button class=btn onclick="state.examIdx++; if(state.examIdx>=state.exam.length)state.examDone=true; renderExam(); renderHome()">下一題</button></div>`}
function renderWrong(){let ids=wrong(),arr=ids.map(id=>mcq.find(q=>q.id===id)).filter(Boolean);wrong.innerHTML=`<div class=card><div class=q>錯題本</div><button class="btn sec2" onclick="saveWrong([]);render()">清空錯題</button></div>`+(arr.length?arr.map(q=>`<div class=item><span class=tag>${q.cat}</span><b> ${q.q}</b><br><span class=ans>答案：${q.opts[q.a]}</span><br><span class=small>${q.exp}</span></div>`).join(''):`<div class=card>目前沒有錯題。</div>`)}
function renderFill(){fill.innerHTML=`<div class=card><div class=q>必考填充題模式</div><div class=small>點題目可顯示／隱藏答案。</div></div>`+fills.map((f,i)=>`<div class=item onclick="state.fillShow=state.fillShow===${i}?null:${i};renderFill()"><b>${i+1}. ${f[0]}</b><div class="ans ${state.fillShow===i?'':'blur'}">${f[1]}</div></div>`).join('')}
function renderSummary(){summary.innerHTML=`<div class=card><div class=q>考前速讀口訣</div><p><b>3B：</b>拼湊靠內部、連介靠外部網絡、傳播靠溝通共識。</p><p><b>創新路徑：</b>規則管方向、資源給誘因、行動推改變。</p><p><b>同形力量：</b>被逼＝強制；不確定跟風＝模仿；專業訓練＝規範。</p><p><b>正當性：</b>有利益＝實用；合價值＝道德；理所當然＝認知。</p><p><b>Oliver：</b>默認、妥協、規避、挑戰、操控，抵抗程度越來越高。</p><p><b>FAN：</b>Framing 賦名、Aggregating 整合、Networking 網路。</p><p><b>工研院連介七項：</b>成立前瞻會、舉辦研討會、引入國外管理機制、汲取大學能量、促進研發聯盟運作、國際化發展、引入開放式創新。</p><p><b>守破離／尼采：</b>守破離＝學、破、創；尼采＝駱駝承擔、獅子反抗、嬰兒創造。</p></div>`}
nav();render();
</script></body></html>
